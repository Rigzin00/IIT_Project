<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="shortcut icon" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="IIT Delhi Integrated Academic Portal — student pre-registration, professor course management, and admin oversight in one place." />
    <title>IIT Delhi — Integrated Academic Portal</title>

    <!-- Preconnect for faster Google Fonts loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Titillium Web — IIT Delhi brand font (design.md: font.family.primary) -->
    <!-- Weights: 300 light · 400 regular · 600 semibold · 700 bold           -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Titillium+Web:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap"
    />
    <!-- Inter — fallback stack for dashboard surfaces -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
    />
    <!-- Open Sans — IIT Delhi Login page theme font -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300;0,400;0,600;0,700;0,800;1,400&display=swap"
    />

    <!-- Pre-React background: prevents blank/dark flash while JS bundle downloads -->
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; background: #F5F5F5; }
      #root { min-height: 100%; }

      /* Shown only before React mounts — removed by React taking over #root */
      #pre-loader {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: #F5F5F5; z-index: 9999;
      }
      #pre-loader .spinner {
        width: 40px; height: 40px; border-radius: 50%;
        border: 4px solid #E5E7EB;
        border-top-color: #C41212;
        animation: spin 0.8s linear infinite;
      }
      #pre-loader p {
        margin-top: 14px;
        font-family: 'Open Sans', sans-serif;
        font-size: 13px; color: #9CA3AF; font-weight: 600;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <!-- Pre-React loader: visible immediately, hidden once React mounts -->
    <div id="pre-loader">
      <div class="spinner"></div>
      <p>Loading…</p>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Remove the pre-loader as soon as React renders anything into #root -->
    <script>
      (function () {
        var observer = new MutationObserver(function () {
          var root = document.getElementById('root');
          if (root && root.firstChild) {
            var loader = document.getElementById('pre-loader');
            if (loader) loader.remove();
            observer.disconnect();
          }
        });
        observer.observe(document.getElementById('root'), { childList: true });
      })();
    </script>
  </body>
</html>
